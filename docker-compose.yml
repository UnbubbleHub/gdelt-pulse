services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-gdelt_pulse}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
      - ./sql/002_api_keys.sql:/docker-entrypoint-initdb.d/002_api_keys.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gdelt} -d ${POSTGRES_DB:-gdelt_pulse}"]
      interval: 5s
      timeout: 3s
      retries: 10

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    restart: unless-stopped
    profiles: ["pipeline"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-gdelt}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGDATABASE: ${POSTGRES_DB:-gdelt_pulse}
      PIPELINE_INTERVAL: "900"

volumes:
  pgdata:
