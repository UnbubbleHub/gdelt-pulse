services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gdelt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-gdelt_pulse}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    # DB only accessible from other containers, not from the host/internet
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gdelt} -d ${POSTGRES_DB:-gdelt_pulse}"]
      interval: 5s
      timeout: 3s
      retries: 10

  pipeline:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER:-gdelt}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGDATABASE: ${POSTGRES_DB:-gdelt_pulse}
      PIPELINE_INTERVAL: "900"  # 15 minutes
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
    command: ["sh", "-c", "uv run python -m gdelt_event_pipeline.runner & uv run uvicorn gdelt_event_pipeline.api.app:app --host 0.0.0.0 --port 8000 & wait"]
    expose:
      - "8000"
    ports:
      - "8000:8000"  # direct access for local dev; Caddy handles prod traffic

  # Reverse proxy with automatic HTTPS — enable for production by setting
  # DOMAIN in .env (e.g. DOMAIN=pulse.example.com)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["production"]  # only starts with: docker compose --profile production up
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    command: caddy reverse-proxy --from ${DOMAIN:-localhost} --to pipeline:8000
    volumes:
      - caddy_data:/data
    depends_on:
      - pipeline

volumes:
  pgdata:
  caddy_data:
