<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gdelt-pulse — dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=JetBrains+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/pulse.css">
<style>
  body {
    font-size: 15px;
    padding: 56px 24px 80px;
  }
  .wrap { max-width: 600px; margin: 0 auto; }
  a { color: var(--accent-text); }
  a:hover { color: var(--accent); }
  h1 {
    font-family: var(--font-serif);
    font-size: 2rem;
    font-weight: 500;
    letter-spacing: -0.015em;
    margin-bottom: 6px;
    color: var(--text);
  }
  .subtitle {
    color: var(--text-3);
    font-size: 0.875rem;
    margin-bottom: 48px;
  }
  .subtitle code {
    font-family: var(--font-mono);
    font-size: 0.8125rem;
    color: var(--text-2);
    padding: 1px 5px;
    border: 1px solid var(--border);
    background: var(--surface);
  }
  .subtitle a { color: var(--text-2); }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px 32px;
  }
  .card-title {
    font-family: var(--font-mono);
    font-size: 0.6875rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-3);
    margin-bottom: 20px;
  }
  .key-display {
    font-family: var(--font-mono);
    font-size: 0.875rem;
    background: var(--bg-subtle);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--accent-text);
    word-break: break-all;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .key-value { flex: 1; }
  .copy-btn {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-3);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.6875rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 10px;
    white-space: nowrap;
    transition: color var(--duration), border-color var(--duration);
  }
  .copy-btn:hover { color: var(--text); border-color: var(--border-hover); }
  .copy-btn.copied { color: var(--positive); border-color: var(--positive); }
  .warning {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--warning);
    margin-bottom: 20px;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .key-meta {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-3);
    margin-bottom: 20px;
  }
  .key-meta span { color: var(--text-2); }
  .no-key-msg {
    color: var(--text-3);
    font-size: 0.9rem;
    margin-bottom: 20px;
  }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-family: var(--font);
    font-size: 0.8125rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    padding: 9px 18px;
    transition: opacity var(--duration), background var(--duration);
  }
  .btn:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { background: var(--accent-text); }
  .btn-danger {
    background: transparent;
    border: 1px solid var(--border-hover);
    color: var(--negative);
  }
  .btn-danger:hover { border-color: var(--negative); }
  .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
  .user-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }
  .user-email {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text-3);
  }
  .sign-out-btn {
    background: none;
    border: none;
    color: var(--text-3);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.6875rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0;
  }
  .sign-out-btn:hover { color: var(--accent); }
  #loading {
    color: var(--text-3);
    font-family: var(--font-mono);
    font-size: 0.8125rem;
    letter-spacing: 0.04em;
    padding: 40px 0;
  }
  .nav-links {
    display: flex;
    gap: 10px;
    margin-top: 48px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }
  .nav-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    text-decoration: none;
    transition: border-color var(--duration), background var(--duration);
    flex: 1;
  }
  .nav-card:hover {
    border-color: var(--border-hover);
    background: var(--surface-2);
  }
  .nav-icon {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    background: var(--surface-2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-3);
    flex-shrink: 0;
  }
  .nav-card:hover .nav-icon { color: var(--accent); }
  .nav-icon svg { width: 16px; height: 16px; }
  .nav-text h4 {
    font-size: 0.8125rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 2px;
  }
  .nav-text p {
    font-family: var(--font-mono);
    font-size: 0.6875rem;
    color: var(--text-3);
  }
  @media (max-width: 768px) { .nav-links { flex-direction: column; } }
</style>
</head>
<body>
<div class="wrap">
  <p id="loading">Loading…</p>
  <div id="app" style="display:none">
    <div class="user-row">
      <span class="user-email" id="user-email"></span>
      <button class="sign-out-btn" id="sign-out-btn">Sign out</button>
    </div>
    <h1>API Key</h1>
    <p class="subtitle">Use your key in the <code>X-API-Key</code> header. <a href="/developers">API docs →</a></p>

    <!-- State: no active key -->
    <div id="state-no-key" class="card" style="display:none">
      <div class="card-title">Your API Key</div>
      <p class="no-key-msg">You don't have an active key yet.</p>
      <div class="actions">
        <button class="btn btn-primary" id="btn-generate">Generate API Key</button>
      </div>
    </div>

    <!-- State: key just created (one-time reveal) -->
    <div id="state-new-key" class="card" style="display:none">
      <div class="card-title">Your API Key</div>
      <div class="warning">⚠ Save this key now — it won't be shown again.</div>
      <div class="key-display">
        <span class="key-value" id="new-key-value"></span>
        <button class="copy-btn" id="copy-new-key">Copy</button>
      </div>
      <hr class="divider">
      <div class="actions">
        <button class="btn btn-danger" id="btn-revoke-new">Revoke Key</button>
      </div>
    </div>

    <!-- State: existing key -->
    <div id="state-existing-key" class="card" style="display:none">
      <div class="card-title">Your API Key</div>
      <div class="key-display">
        <span class="key-value" id="existing-key-prefix"></span>
      </div>
      <div class="key-meta" id="existing-key-meta"></div>
      <div class="actions">
        <button class="btn btn-primary" id="btn-regenerate">Regenerate Key</button>
        <button class="btn btn-danger" id="btn-revoke-existing">Revoke Key</button>
      </div>
    </div>
  </div>
  <div class="nav-links" id="nav-links">
    <a class="nav-card" href="/api/docs">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </div>
      <div class="nav-text">
        <h4>API Docs</h4>
        <p>Interactive Swagger UI</p>
      </div>
    </a>
    <a class="nav-card" href="/developers">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </div>
      <div class="nav-text">
        <h4>Reference</h4>
        <p>Endpoints, params, examples</p>
      </div>
    </a>
    <a class="nav-card" href="/">
      <div class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div class="nav-text">
        <h4>Home</h4>
        <p>Back to gdelt-pulse</p>
      </div>
    </a>
  </div>
</div>

<script>
(async () => {
  const loading = document.getElementById('loading');
  const appDiv = document.getElementById('app');

  // 1. Fetch Clerk publishable key from backend config
  let publishableKey;
  try {
    const res = await fetch('/api/auth/config');
    const cfg = await res.json();
    publishableKey = cfg.clerk_publishable_key;
  } catch (e) {
    loading.textContent = 'Failed to load configuration.';
    return;
  }

  if (!publishableKey) {
    loading.textContent = 'Auth is not configured on this server.';
    return;
  }

  // 2. Load Clerk JS SDK from CDN (key as data attribute prevents auto-init error)
  await new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js';
    s.setAttribute('data-clerk-publishable-key', publishableKey);
    s.crossOrigin = 'anonymous';
    s.onload = resolve;
    s.onerror = () => reject(new Error('Failed to load Clerk JS'));
    document.head.appendChild(s);
  });

  // 3. window.Clerk is a singleton instance in v5 — call load() directly
  const clerk = window.Clerk;
  await clerk.load();

  if (!clerk.user) {
    clerk.redirectToSignIn({ redirectUrl: window.location.href });
    return;
  }

  // 4. Show the app
  loading.style.display = 'none';
  appDiv.style.display = 'block';
  document.getElementById('user-email').textContent = clerk.user.primaryEmailAddress?.emailAddress || '';
  document.getElementById('sign-out-btn').addEventListener('click', async () => {
    await clerk.signOut();
    window.location.href = '/developers';
  });

  // Helper: get a fresh session token for API calls
  async function getToken() {
    if (!clerk.session) throw new Error('No active session');
    const token = await clerk.session.getToken();
    if (!token) throw new Error('Could not retrieve session token');
    return token;
  }

  // Helper: authenticated fetch — throws on non-2xx
  async function apiFetch(path, options = {}) {
    const token = await getToken();
    const res = await fetch(path, {
      ...options,
      headers: { 'Authorization': `Bearer ${token}`, ...(options.headers || {}) },
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(body.detail || `HTTP ${res.status}`);
    }
    return res;
  }

  // 5. UI state management
  const stateNoKey = document.getElementById('state-no-key');
  const stateNewKey = document.getElementById('state-new-key');
  const stateExistingKey = document.getElementById('state-existing-key');

  function showState(name) {
    stateNoKey.style.display = name === 'no-key' ? '' : 'none';
    stateNewKey.style.display = name === 'new-key' ? '' : 'none';
    stateExistingKey.style.display = name === 'existing-key' ? '' : 'none';
  }

  function formatDate(iso) {
    if (!iso) return 'never';
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function formatRelative(iso) {
    if (!iso) return 'never';
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  // 6. Load current key state
  async function loadKeyState() {
    try {
      const res = await apiFetch('/api/auth/keys');
      const data = await res.json();
      if (data.active) {
        const prefix = document.getElementById('existing-key-prefix');
        prefix.textContent = data.prefix + '••••••••••••••••••••••••';
        const meta = document.getElementById('existing-key-meta');
        meta.innerHTML = `Created <span>${formatDate(data.created_at)}</span> · Last used <span>${formatRelative(data.last_used_at)}</span>`;
        showState('existing-key');
      } else {
        showState('no-key');
      }
    } catch (e) {
      console.error('loadKeyState failed:', e);
      showState('no-key');
    }
  }

  await loadKeyState();

  // 7. Copy button
  document.getElementById('copy-new-key').addEventListener('click', function () {
    const key = document.getElementById('new-key-value').textContent;
    navigator.clipboard.writeText(key).then(() => {
      this.textContent = 'Copied!';
      this.classList.add('copied');
      setTimeout(() => { this.textContent = 'Copy'; this.classList.remove('copied'); }, 2000);
    });
  });

  // 8. Generate key
  document.getElementById('btn-generate').addEventListener('click', async function () {
    this.disabled = true;
    this.textContent = 'Generating…';
    try {
      const res = await apiFetch('/api/auth/keys', { method: 'POST' });
      const data = await res.json();
      document.getElementById('new-key-value').textContent = data.key;
      showState('new-key');
    } catch (e) {
      console.error('Generate key failed:', e);
      alert(`Failed to generate key: ${e.message}`);
    } finally {
      this.disabled = false;
      this.textContent = 'Generate API Key';
    }
  });

  // 9. Regenerate key (from existing-key state)
  document.getElementById('btn-regenerate').addEventListener('click', async function () {
    if (!confirm('This will revoke your current key. All integrations using it will stop working. Continue?')) return;
    this.disabled = true;
    this.textContent = 'Regenerating…';
    try {
      const res = await apiFetch('/api/auth/keys', { method: 'POST' });
      const data = await res.json();
      document.getElementById('new-key-value').textContent = data.key;
      showState('new-key');
    } catch (e) {
      console.error('Regenerate key failed:', e);
      alert(`Failed to regenerate key: ${e.message}`);
    } finally {
      this.disabled = false;
      this.textContent = 'Regenerate Key';
    }
  });

  // 10. Revoke key (from new-key state)
  document.getElementById('btn-revoke-new').addEventListener('click', async function () {
    if (!confirm('Revoke this key? You can generate a new one at any time.')) return;
    this.disabled = true;
    try {
      await apiFetch('/api/auth/keys', { method: 'DELETE' });
      showState('no-key');
    } catch (e) {
      alert('Failed to revoke key. Please try again.');
    } finally {
      this.disabled = false;
    }
  });

  // 11. Revoke key (from existing-key state)
  document.getElementById('btn-revoke-existing').addEventListener('click', async function () {
    if (!confirm('Revoke your API key? All integrations using it will stop working immediately.')) return;
    this.disabled = true;
    try {
      await apiFetch('/api/auth/keys', { method: 'DELETE' });
      showState('no-key');
    } catch (e) {
      alert('Failed to revoke key. Please try again.');
    } finally {
      this.disabled = false;
    }
  });
})();
</script>
</body>
</html>
